<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guides Cuts — barber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101114;
    --surface:#17181C;
    --surface-hover:#1D1F24;
    --border:#2A2C31;
    --text:#EDEDEF;
    --text-dim:#8B8D94;
    --text-faint:#54565D;
    --accent:#3ECF8E;
    --accent-dim:#1F5E43;
    --danger:#D9695F;
    --danger-dim:#4A2622;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:640px;margin:0 auto;padding:40px 20px 80px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .wordmark{font-size:19px;font-weight:600;letter-spacing:-0.2px;}
  .badge{
    font-size:11px;color:var(--text-dim);background:var(--surface);
    border:1px solid var(--border);padding:3px 9px;border-radius:20px;
  }
  .subtitle{color:var(--text-dim);font-size:13px;margin-top:4px;margin-bottom:28px;}

  .lock{text-align:center;padding:70px 10px 20px;}
  .lock h2{font-size:16px;font-weight:500;margin:0 0 8px;}
  .lock p{color:var(--text-dim);font-size:13px;max-width:320px;margin:0 auto 22px;line-height:1.6;}
  .lock input{
    display:block;width:100%;max-width:200px;margin:0 auto 14px;
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:8px;font-family:inherit;font-size:14px;text-align:center;
  }
  .lock input:focus{outline:1px solid var(--accent);}
  .lock .btn{max-width:200px;margin:0 auto;}

  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:16px;margin-bottom:26px;
  }
  .card-title{font-size:12px;color:var(--text-dim);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:14px;}

  .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  @media (max-width:520px){.form-row{grid-template-columns:1fr;}}
  .field-mini label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:6px;}
  .field-mini input,.field-mini select{
    width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:6px;font-family:inherit;font-size:13px;
  }
  .field-mini input:focus,.field-mini select:focus{outline:1px solid var(--accent);}

  .btn{
    font-family:inherit;font-size:13px;font-weight:500;border-radius:7px;
    padding:10px 16px;cursor:pointer;border:1px solid transparent;
  }
  .btn-primary{background:var(--accent);color:#08130E;width:100%;}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-ghost{background:none;border-color:var(--border);color:var(--text-dim);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
  .btn-danger{background:none;border-color:var(--danger-dim);color:var(--danger);}
  .btn-danger:hover{background:var(--danger-dim);}
  .btn-small{padding:6px 11px;font-size:12px;}

  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .weeknav .label{font-size:14px;font-weight:500;}
  .weeknav .arrows{display:flex;gap:4px;}
  .weeknav button{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:hover{color:var(--text);border-color:var(--text-faint);}

  .day-group{margin-bottom:20px;}
  .day-label{font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .day-label.today{color:var(--accent);}
  .day-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .slot-row{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:11px 13px;margin-bottom:7px;
  }
  .slot-time{font-size:13px;font-weight:500;min-width:76px;}
  .slot-dur{font-size:11px;color:var(--text-faint);display:block;font-weight:400;margin-top:1px;}
  .slot-info{flex:1;min-width:0;}
  .slot-info .who{font-size:13px;font-weight:500;}
  .slot-info .meta{font-size:12px;color:var(--text-dim);margin-top:1px;}
  .slot-info .note{font-size:12px;color:var(--text-faint);margin-top:1px;font-style:italic;}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .status-dot.open{border:1.5px solid var(--accent);}
  .status-dot.booked{background:var(--text-faint);}
  .open-label{font-size:12px;color:var(--text-dim);}

  .empty-state{
    border:1px dashed var(--border);border-radius:10px;padding:30px 20px;
    text-align:center;color:var(--text-dim);font-size:13px;
  }
  .empty-state strong{display:block;color:var(--text);font-size:14px;font-weight:500;margin-bottom:5px;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--text);color:var(--bg);padding:10px 18px;border-radius:6px;
    font-size:13px;font-weight:500;z-index:50;
  }
  .loading{text-align:center;padding:60px 0;color:var(--text-faint);font-size:13px;}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading the schedule…</div></div>

<script>
(function(){
  const app = document.getElementById('app');
  const DURATIONS = [15,20,30,45,60];

  let schedule = [];
  let barberPin = null;
  let unlocked = false;
  let weekStart = mondayOf(new Date());
  let toastMsg = null;
  let toastTimer = null;

  function mondayOf(d){
    const dt=new Date(d); const day=dt.getDay();
    const diff=(day===0?-6:1)-day; dt.setDate(dt.getDate()+diff); dt.setHours(0,0,0,0);
    return dt;
  }
  function iso(d){ return d.toISOString().slice(0,10); }
  function addDays(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }
  function todayIso(){ return iso(new Date()); }
  function fmtTime(t){
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM'; const hh=((h+11)%12)+1;
    return hh+':'+String(m).padStart(2,'0')+' '+ampm;
  }
  function fmtRange(start){
    const end=addDays(start,6); const opts={month:'short',day:'numeric'};
    return start.toLocaleDateString(undefined,opts)+' – '+end.toLocaleDateString(undefined,opts);
  }
  function fmtDayLabel(dateIso){
    const d=new Date(dateIso+'T00:00:00');
    return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  }
  function id(){ return 't'+Date.now()+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    toastMsg=msg; render();
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{toastMsg=null; render();},2600);
  }

  async function loadAll(){
    try{
      const s=await window.storage.get('schedule', true);
      schedule = s? JSON.parse(s.value) : [];
    }catch(e){ schedule=[]; }
    try{
      const p=await window.storage.get('barber_pin', true);
      barberPin = p? p.value : null;
    }catch(e){ barberPin=null; }
    render();
  }
  async function saveSchedule(){
    try{ await window.storage.set('schedule', JSON.stringify(schedule), true); }
    catch(e){ showToast("Couldn't save — try again"); }
  }

  async function addSlot(date,time,duration){
    const exists = schedule.some(s=>s.date===date && s.time===time);
    if(exists){ showToast('That slot already exists'); return; }
    schedule.push({id:id(), date, time, duration, status:'open', clientName:'', haircutType:'', note:''});
    await saveSchedule();
    showToast('Slot added');
    render();
  }
  async function removeSlot(slotId){
    schedule = schedule.filter(s=>s.id!==slotId);
    await saveSchedule();
    render();
  }
  async function cancelBooking(slotId){
    const slot = schedule.find(s=>s.id===slotId);
    if(!slot) return;
    slot.status='open'; slot.clientName=''; slot.haircutType=''; slot.note='';
    await saveSchedule();
    showToast('Booking cancelled');
    render();
  }

  function render(){
    app.innerHTML='';
    const top=document.createElement('div'); top.className='topbar';
    top.innerHTML=`<div class="wordmark">Guides Cuts</div><span class="badge">Barber view</span>`;
    app.appendChild(top);

    if(!unlocked){
      app.appendChild(buildLock());
      return;
    }

    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Manage your free slots and see what\'s booked';
    app.appendChild(sub);

    app.appendChild(buildAddCard());
    app.appendChild(buildScheduleCard());

    if(toastMsg){
      const t=document.createElement('div'); t.className='toast'; t.textContent=toastMsg;
      app.appendChild(t);
    }
  }

  function buildLock(){
    const wrap=document.createElement('div'); wrap.className='lock';
    const isNew = !barberPin;
    wrap.innerHTML = `
      <h2>${isNew? 'Set a barber PIN' : 'Enter your barber PIN'}</h2>
      <p>${isNew
        ? "This is a light deterrent, not real security — it just keeps casual visitors from editing your schedule. Pick something quick to type."
        : "Keeps people in the house from editing your slots."}</p>
    `;
    const input=document.createElement('input');
    input.type='password'; input.placeholder='PIN';
    wrap.appendChild(input);

    const btn=document.createElement('button');
    btn.className='btn btn-primary';
    btn.style.maxWidth='200px'; btn.style.margin='0 auto'; btn.style.display='block';
    btn.textContent = isNew? 'Set PIN & continue' : 'Unlock';
    btn.onclick=async ()=>{
      const val=input.value.trim();
      if(!val){ showToast('Type a PIN first'); return; }
      if(isNew){
        if(val.length<3){ showToast('Use at least 3 characters'); return; }
        barberPin=val;
        try{ await window.storage.set('barber_pin', val, true); }catch(e){}
        unlocked=true; render();
      } else {
        if(val===barberPin){ unlocked=true; render(); }
        else { showToast('Wrong PIN'); }
      }
    };
    input.onkeydown=(e)=>{ if(e.key==='Enter') btn.click(); };
    wrap.appendChild(btn);
    return wrap;
  }

  function buildAddCard(){
    const card=document.createElement('div'); card.className='card';
    const title=document.createElement('div'); title.className='card-title'; title.textContent='Add a free slot';
    card.appendChild(title);

    const row=document.createElement('div'); row.className='form-row';
    const dateWrap=document.createElement('div'); dateWrap.className='field-mini';
    dateWrap.innerHTML='<label>Date</label>';
    const dateInput=document.createElement('input'); dateInput.type='date'; dateInput.min=todayIso(); dateInput.value=todayIso();
    dateWrap.appendChild(dateInput);

    const timeWrap=document.createElement('div'); timeWrap.className='field-mini';
    timeWrap.innerHTML='<label>Time</label>';
    const timeInput=document.createElement('input'); timeInput.type='time'; timeInput.value='14:00';
    timeWrap.appendChild(timeInput);

    const durWrap=document.createElement('div'); durWrap.className='field-mini';
    durWrap.innerHTML='<label>Duration</label>';
    const durSelect=document.createElement('select');
    DURATIONS.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d+' min'; if(d===30)o.selected=true; durSelect.appendChild(o); });
    durWrap.appendChild(durSelect);

    row.appendChild(dateWrap); row.appendChild(timeWrap); row.appendChild(durWrap);
    card.appendChild(row);

    const addBtn=document.createElement('button');
    addBtn.className='btn btn-primary';
    addBtn.textContent='Add slot';
    addBtn.onclick=()=>{
      if(!dateInput.value || !timeInput.value){ showToast('Pick a date and time'); return; }
      addSlot(dateInput.value, timeInput.value, Number(durSelect.value));
    };
    card.appendChild(addBtn);
    return card;
  }

  function buildScheduleCard(){
    const wrap=document.createElement('div');

    const nav=document.createElement('div'); nav.className='weeknav';
    nav.innerHTML=`<div class="label">${fmtRange(weekStart)}</div>`;
    const arrows=document.createElement('div'); arrows.className='arrows';
    const prev=document.createElement('button'); prev.textContent='‹';
    prev.onclick=()=>{ weekStart=addDays(weekStart,-7); render(); };
    const next=document.createElement('button'); next.textContent='›';
    next.onclick=()=>{ weekStart=addDays(weekStart,7); render(); };
    arrows.appendChild(prev); arrows.appendChild(next);
    nav.appendChild(arrows);
    wrap.appendChild(nav);

    const weekSlots = schedule.filter(s=>{
      const d=s.date;
      return d>=iso(weekStart) && d<=iso(addDays(weekStart,6));
    });

    if(weekSlots.length===0){
      const empty=document.createElement('div'); empty.className='empty-state';
      empty.innerHTML='<strong>Nothing this week</strong>Add a free slot above so clients can start booking.';
      wrap.appendChild(empty);
      return wrap;
    }

    const byDate={};
    weekSlots.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
    Object.keys(byDate).sort().forEach(date=>{
      const group=document.createElement('div'); group.className='day-group';
      const label=document.createElement('div');
      label.className='day-label'+(date===todayIso()?' today':'');
      label.textContent=fmtDayLabel(date);
      group.appendChild(label);

      byDate[date].sort((a,b)=>a.time.localeCompare(b.time)).forEach(slot=>{
        group.appendChild(buildSlotRow(slot));
      });
      wrap.appendChild(group);
    });

    return wrap;
  }

  function buildSlotRow(slot){
    const row=document.createElement('div'); row.className='slot-row';
    const isOpen = slot.status==='open';

    const dot=document.createElement('span'); dot.className='status-dot '+(isOpen?'open':'booked');
    row.appendChild(dot);

    const time=document.createElement('div'); time.className='slot-time';
    time.innerHTML=`${fmtTime(slot.time)}<span class="slot-dur">${slot.duration} min</span>`;
    row.appendChild(time);

    const info=document.createElement('div'); info.className='slot-info';
    if(isOpen){
      info.innerHTML=`<span class="open-label">Open</span>`;
    } else {
      info.innerHTML=`
        <div class="who">${escapeHtml(slot.clientName)}</div>
        <div class="meta">${escapeHtml(slot.haircutType||'')}</div>
        ${slot.note? `<div class="note">"${escapeHtml(slot.note)}"</div>` : ''}
      `;
    }
    row.appendChild(info);

    if(isOpen){
      const del=document.createElement('button');
      del.className='btn btn-ghost btn-small'; del.textContent='Remove';
      del.onclick=()=>removeSlot(slot.id);
      row.appendChild(del);
    } else {
      const cancel=document.createElement('button');
      cancel.className='btn btn-danger btn-small'; cancel.textContent='Cancel';
      cancel.onclick=()=>{ if(confirm('Cancel '+slot.clientName+"'s booking?")) cancelBooking(slot.id); };
      row.appendChild(cancel);
    }
    return row;
  }

  function escapeHtml(str){
    const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML;
  }

  loadAll();
})();
</script>
</body>
</html>
