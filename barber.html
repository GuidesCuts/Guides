<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guides Cuts — barber</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F7F5F0;
    --surface-hover:#EFEBE0;
    --border:#E4E0D3;
    --text:#1D1F23;
    --text-dim:#5F636B;
    --text-faint:#9C9FA6;
    --accent:#1FA971;
    --accent-soft:#E3F6EC;
    --accent-dark:#15754C;
    --danger:#D64545;
    --danger-soft:#FBE8E6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    font-size:16px;
  }
  #app{max-width:680px;margin:0 auto;padding:32px 20px 90px;}
  @media (min-width:640px){ #app{padding:48px 24px 90px;} }

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .wordmark{font-family:'Fraunces',serif;font-weight:700;font-size:26px;letter-spacing:-0.3px;}
  .badge{
    font-size:12px;color:var(--accent-dark);background:var(--accent-soft);
    border:1px solid #CDEEDD;padding:5px 12px;border-radius:20px;font-weight:600;
  }
  .subtitle{color:var(--text-dim);font-size:15px;margin-top:6px;margin-bottom:30px;}

  .lock{text-align:center;padding:70px 10px 20px;}
  .lock h2{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin:0 0 10px;}
  .lock p{color:var(--text-dim);font-size:14px;max-width:340px;margin:0 auto 22px;line-height:1.6;}
  .lock input{
    display:block;width:100%;max-width:220px;margin:0 auto 14px;
    background:var(--surface);border:1.5px solid var(--border);color:var(--text);
    padding:12px 14px;border-radius:10px;font-family:inherit;font-size:15px;text-align:center;
  }
  .lock input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .lock .btn{max-width:220px;margin:0 auto;}

  .card{
    background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
    padding:20px;margin-bottom:28px;
  }
  .card-title{font-size:13px;color:var(--text-dim);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:16px;font-weight:600;}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media (max-width:520px){.form-row{grid-template-columns:1fr;}}
  .field-mini label{font-size:13px;color:var(--text-dim);display:block;margin-bottom:7px;font-weight:500;}
  .field-mini input,.field-mini select{
    width:100%;background:#fff;border:1.5px solid var(--border);color:var(--text);
    padding:12px 12px;border-radius:9px;font-family:inherit;font-size:15px;
  }
  .field-mini input:focus,.field-mini select:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .btn{
    font-family:inherit;font-size:15px;font-weight:600;border-radius:10px;
    padding:12px 18px;cursor:pointer;border:1.5px solid transparent;
  }
  .btn-primary{background:var(--accent);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:none;border-color:var(--border);color:var(--text-dim);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
  .btn-danger{background:none;border-color:var(--danger);color:var(--danger);}
  .btn-danger:hover{background:var(--danger-soft);}
  .btn-small{padding:8px 13px;font-size:13px;}

  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .weeknav .label{font-size:16px;font-weight:600;}
  .weeknav .arrows{display:flex;gap:5px;}
  .weeknav button{
    background:var(--surface);border:1.5px solid var(--border);color:var(--text-dim);
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:hover{color:var(--text);border-color:var(--text-faint);}

  .day-group{margin-bottom:22px;}
  .day-label{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .day-label.today{color:var(--accent-dark);}
  .day-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .slot-row{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
    padding:14px 16px;margin-bottom:9px;
  }
  .slot-time{font-size:15px;font-weight:700;min-width:82px;}
  .slot-dur{font-size:12px;color:var(--text-faint);display:block;font-weight:400;margin-top:2px;}
  .slot-info{flex:1;min-width:140px;}
  .slot-info .who{font-size:15px;font-weight:600;}
  .slot-info .meta{font-size:13px;color:var(--text-dim);margin-top:2px;}
  .slot-info .note{font-size:13px;color:var(--text-faint);margin-top:2px;font-style:italic;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .status-dot.open{background:var(--accent);}
  .status-dot.booked{background:var(--text-faint);}
  .open-label{font-size:13px;color:var(--accent-dark);font-weight:600;}

  .empty-state{
    border:1.5px dashed var(--border);border-radius:14px;padding:36px 20px;
    text-align:center;color:var(--text-dim);font-size:14px;
  }
  .empty-state strong{display:block;color:var(--text);font-size:16px;font-weight:700;margin-bottom:6px;font-family:'Fraunces',serif;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;padding:11px 18px;border-radius:8px;
    font-size:14px;font-weight:600;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,0.15);
  }
  .loading{text-align:center;padding:60px 0;color:var(--text-faint);font-size:14px;}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading the schedule…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtT30zmqBS8tPFpenQsK2WH-fltK9zMPY",
  authDomain: "guides-cuts.firebaseapp.com",
  projectId: "guides-cuts",
  storageBucket: "guides-cuts.firebasestorage.app",
  messagingSenderId: "893275987355",
  appId: "1:893275987355:web:6c300a821d58cfdca5d53e",
  measurementId: "G-2RZNRSSE1C"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

window.storage = {
  async get(key, shared){
    const snap = await getDoc(doc(db, 'kv', key));
    if(!snap.exists()) throw new Error('not found');
    return { key, value: snap.data().value, shared: !!shared };
  },
  async set(key, value, shared){
    await setDoc(doc(db, 'kv', key), { value });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    await deleteDoc(doc(db, 'kv', key));
    return { key, deleted:true, shared: !!shared };
  }
};

(function(){
  const app = document.getElementById('app');
  const SESSION_MINUTES = 60;

  function buildTimeOptions(){
    const opts=[];
    for(let h=6; h<24; h++){
      for(let m=0; m<60; m+=15){
        opts.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));
      }
    }
    return opts;
  }

  let schedule = [];
  let barberPin = null;
  let unlocked = false;
  let weekStart = mondayOf(new Date());
  let toastMsg = null;
  let toastTimer = null;

  function mondayOf(d){
    const dt=new Date(d); const day=dt.getDay();
    const diff=(day===0?-6:1)-day; dt.setDate(dt.getDate()+diff); dt.setHours(0,0,0,0);
    return dt;
  }
  function iso(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function addDays(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }
  function todayIso(){ return iso(new Date()); }
  function fmtTime(t){
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM'; const hh=((h+11)%12)+1;
    return hh+':'+String(m).padStart(2,'0')+' '+ampm;
  }
  function fmtRange(start){
    const end=addDays(start,6); const opts={month:'short',day:'numeric'};
    return start.toLocaleDateString(undefined,opts)+' – '+end.toLocaleDateString(undefined,opts);
  }
  function fmtDayLabel(dateIso){
    const d=new Date(dateIso+'T00:00:00');
    return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  }
  function id(){ return 't'+Date.now()+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    toastMsg=msg; render();
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{toastMsg=null; render();},2600);
  }

  async function loadAll(){
    try{
      const s=await window.storage.get('schedule', true);
      schedule = s? JSON.parse(s.value) : [];
    }catch(e){ schedule=[]; }
    try{
      const p=await window.storage.get('barber_pin', true);
      barberPin = p? p.value : null;
    }catch(e){ barberPin=null; }
    render();
  }
  async function saveSchedule(){
    try{ await window.storage.set('schedule', JSON.stringify(schedule), true); }
    catch(e){ showToast("Couldn't save — try again"); }
  }

  async function addSlot(date,time,duration){
    const exists = schedule.some(s=>s.date===date && s.time===time);
    if(exists){ showToast('That slot already exists'); return; }
    schedule.push({id:id(), date, time, duration, status:'open', clientName:'', haircutType:'', note:''});
    await saveSchedule();
    showToast('Slot added');
    render();
  }
  async function removeSlot(slotId){
    schedule = schedule.filter(s=>s.id!==slotId);
    await saveSchedule();
    render();
  }
  async function cancelBooking(slotId){
    const slot = schedule.find(s=>s.id===slotId);
    if(!slot) return;
    slot.status='open'; slot.clientName=''; slot.haircutType=''; slot.note='';
    await saveSchedule();
    showToast('Booking cancelled');
    render();
  }

  function render(){
    app.innerHTML='';
    const top=document.createElement('div'); top.className='topbar';
    top.innerHTML=`<div class="wordmark">Guides Cuts</div><span class="badge">Barber view</span>`;
    app.appendChild(top);

    if(!unlocked){
      app.appendChild(buildLock());
      return;
    }

    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Manage your free slots and see what\'s booked';
    app.appendChild(sub);

    app.appendChild(buildAddCard());
    app.appendChild(buildScheduleCard());

    if(toastMsg){
      const t=document.createElement('div'); t.className='toast'; t.textContent=toastMsg;
      app.appendChild(t);
    }
  }

  function buildLock(){
    const wrap=document.createElement('div'); wrap.className='lock';
    const isNew = !barberPin;
    wrap.innerHTML = `
      <h2>${isNew? 'Set a barber PIN' : 'Enter your barber PIN'}</h2>
      <p>${isNew
        ? "This is a light deterrent, not real security — it just keeps casual visitors from editing your schedule. Pick something quick to type."
        : "Keeps people in the house from editing your slots."}</p>
    `;
    const input=document.createElement('input');
    input.type='password'; input.placeholder='PIN';
    wrap.appendChild(input);

    const btn=document.createElement('button');
    btn.className='btn btn-primary';
    btn.style.maxWidth='200px'; btn.style.margin='0 auto'; btn.style.display='block';
    btn.textContent = isNew? 'Set PIN & continue' : 'Unlock';
    btn.onclick=async ()=>{
      const val=input.value.trim();
      if(!val){ showToast('Type a PIN first'); return; }
      if(isNew){
        if(val.length<3){ showToast('Use at least 3 characters'); return; }
        barberPin=val;
        try{ await window.storage.set('barber_pin', val, true); }catch(e){}
        unlocked=true; render();
      } else {
        if(val===barberPin){ unlocked=true; render(); }
        else { showToast('Wrong PIN'); }
      }
    };
    input.onkeydown=(e)=>{ if(e.key==='Enter') btn.click(); };
    wrap.appendChild(btn);
    return wrap;
  }

  function buildAddCard(){
    const card=document.createElement('div'); card.className='card';
    const title=document.createElement('div'); title.className='card-title'; title.textContent='Add a free slot';
    card.appendChild(title);

    const row=document.createElement('div'); row.className='form-row';
    const dateWrap=document.createElement('div'); dateWrap.className='field-mini';
    dateWrap.innerHTML='<label>Date</label>';
    const dateSelect=document.createElement('select');
    const today=new Date();
    for(let i=0;i<21;i++){
      const d=addDays(today,i);
      const o=document.createElement('option');
      o.value=iso(d);
      o.textContent=d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
      dateSelect.appendChild(o);
    }
    dateWrap.appendChild(dateSelect);

    const timeWrap=document.createElement('div'); timeWrap.className='field-mini';
    timeWrap.innerHTML='<label>Time</label>';
    const timeSelect=document.createElement('select');
    buildTimeOptions().forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=fmtTime(t); if(t==='14:00') o.selected=true; timeSelect.appendChild(o); });
    timeWrap.appendChild(timeSelect);

    row.appendChild(dateWrap); row.appendChild(timeWrap);
    card.appendChild(row);

    const durNote=document.createElement('div');
    durNote.style.cssText='font-size:13px;color:var(--text-faint);margin-bottom:14px;';
    durNote.textContent='Every session is 60 minutes.';
    card.appendChild(durNote);

    const addBtn=document.createElement('button');
    addBtn.className='btn btn-primary';
    addBtn.textContent='Add slot';
    addBtn.onclick=()=>{
      addSlot(dateSelect.value, timeSelect.value, SESSION_MINUTES);
    };
    card.appendChild(addBtn);
    return card;
  }

  function buildScheduleCard(){
    const wrap=document.createElement('div');

    const nav=document.createElement('div'); nav.className='weeknav';
    nav.innerHTML=`<div class="label">${fmtRange(weekStart)}</div>`;
    const arrows=document.createElement('div'); arrows.className='arrows';
    const prev=document.createElement('button'); prev.textContent='‹';
    prev.onclick=()=>{ weekStart=addDays(weekStart,-7); render(); };
    const next=document.createElement('button'); next.textContent='›';
    next.onclick=()=>{ weekStart=addDays(weekStart,7); render(); };
    arrows.appendChild(prev); arrows.appendChild(next);
    nav.appendChild(arrows);
    wrap.appendChild(nav);

    const weekSlots = schedule.filter(s=>{
      const d=s.date;
      return d>=iso(weekStart) && d<=iso(addDays(weekStart,6));
    });

    if(weekSlots.length===0){
      const empty=document.createElement('div'); empty.className='empty-state';
      empty.innerHTML='<strong>Nothing this week</strong>Add a free slot above so clients can start booking.';
      wrap.appendChild(empty);
      return wrap;
    }

    const byDate={};
    weekSlots.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
    Object.keys(byDate).sort().forEach(date=>{
      const group=document.createElement('div'); group.className='day-group';
      const label=document.createElement('div');
      label.className='day-label'+(date===todayIso()?' today':'');
      label.textContent=fmtDayLabel(date);
      group.appendChild(label);

      byDate[date].sort((a,b)=>a.time.localeCompare(b.time)).forEach(slot=>{
        group.appendChild(buildSlotRow(slot));
      });
      wrap.appendChild(group);
    });

    return wrap;
  }

  function buildSlotRow(slot){
    const row=document.createElement('div'); row.className='slot-row';
    const isOpen = slot.status==='open';

    const dot=document.createElement('span'); dot.className='status-dot '+(isOpen?'open':'booked');
    row.appendChild(dot);

    const time=document.createElement('div'); time.className='slot-time';
    time.innerHTML=`${fmtTime(slot.time)}<span class="slot-dur">${slot.duration} min</span>`;
    row.appendChild(time);

    const info=document.createElement('div'); info.className='slot-info';
    if(isOpen){
      info.innerHTML=`<span class="open-label">Open</span>`;
    } else {
      info.innerHTML=`
        <div class="who">${escapeHtml(slot.clientName)}</div>
        <div class="meta">${escapeHtml(slot.haircutType||'')}${slot.price? ' — $'+slot.price : ''}${slot.residentType? ' ('+escapeHtml(slot.residentType)+')' : ''}</div>
        ${slot.contactValue? `<div class="meta">${escapeHtml(slot.contactMethod||'')}: ${escapeHtml(slot.contactValue)}</div>` : ''}
        ${slot.note? `<div class="note">"${escapeHtml(slot.note)}"</div>` : ''}
        ${slot.photo? `<img src="${slot.photo}" style="max-width:70px;border-radius:6px;margin-top:6px;display:block;border:1px solid var(--border);">` : ''}
      `;
    }
    row.appendChild(info);

    if(isOpen){
      const del=document.createElement('button');
      del.className='btn btn-ghost btn-small'; del.textContent='Remove';
      del.onclick=()=>removeSlot(slot.id);
      row.appendChild(del);
    } else {
      const cal=document.createElement('a');
      cal.className='btn btn-ghost btn-small';
      cal.textContent='Add to Calendar';
      cal.target='_blank';
      cal.rel='noopener';
      cal.href=googleCalendarUrl(slot);
      row.appendChild(cal);

      const cancel=document.createElement('button');
      cancel.className='btn btn-danger btn-small'; cancel.textContent='Cancel';
      cancel.onclick=()=>{ if(confirm('Cancel '+slot.clientName+"'s booking?")) cancelBooking(slot.id); };
      row.appendChild(cancel);
    }
    return row;
  }

  function googleCalendarUrl(slot){
    const [h,m] = slot.time.split(':').map(Number);
    const start = new Date(slot.date+'T00:00:00');
    start.setHours(h,m,0,0);
    const end = new Date(start.getTime() + slot.duration*60000);
    const fmt = (d)=> d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const text = encodeURIComponent('Haircut — '+slot.clientName);
    const details = encodeURIComponent((slot.haircutType||'')+(slot.note? ' — "'+slot.note+'"':''));
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${fmt(start)}/${fmt(end)}&details=${details}`;
  }

  function escapeHtml(str){
    const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML;
  }

  loadAll();
})();
</script>
</body>
</html>
