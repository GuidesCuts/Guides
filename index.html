<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guides Cuts</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F7F5F0;
    --surface-hover:#EFEBE0;
    --border:#E4E0D3;
    --text:#1D1F23;
    --text-dim:#5F636B;
    --text-faint:#9C9FA6;
    --accent:#1FA971;
    --accent-soft:#E3F6EC;
    --accent-dark:#15754C;
    --warn:#C98A5E;
    --warn-soft:#FBF1E8;
    --danger:#D64545;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    font-size:16px;
  }
  #app{max-width:640px;margin:0 auto;padding:28px 18px 100px;}
  @media (min-width:640px){ #app{padding:44px 24px 100px;} }

  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .back{
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    font-size:14px;font-family:inherit;padding:6px 0;display:flex;align-items:center;gap:5px;
  }
  .back:hover{color:var(--text);}

  .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .brand-icon{width:34px;height:34px;flex-shrink:0;}
  .wordmark{font-family:'Fraunces',serif;font-weight:700;font-size:26px;letter-spacing:-0.3px;}
  .subtitle{color:var(--text-dim);font-size:15px;margin-top:6px;margin-bottom:22px;}

  .step-dots{display:flex;gap:6px;margin-bottom:22px;}
  .step-dots span{width:24px;height:4px;border-radius:2px;background:var(--border);}
  .step-dots span.done{background:var(--accent-dark);opacity:0.5;}
  .step-dots span.active{background:var(--accent);}

  .price-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .price-pill{
    flex:1;min-width:150px;
    background:var(--accent-soft);border:1px solid #CDEEDD;border-radius:12px;
    padding:12px 14px;
  }
  .price-pill .amount{font-family:'Fraunces',serif;font-weight:700;font-size:22px;color:var(--accent-dark);}
  .price-pill .who{font-size:13px;color:var(--text-dim);margin-top:2px;}

  .name-row{
    border-radius:12px;
    padding:14px 16px;margin-bottom:8px;
    border:1.5px solid var(--warn);
    background:var(--warn-soft);
    transition:border-color .15s, background .15s;
  }
  .name-row.filled{border-color:var(--border);background:var(--surface);}
  .name-row label{
    font-size:13px;color:var(--text);font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:6px;
  }
  .name-row label .req{color:var(--warn);font-weight:700;}
  .name-row input{
    width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;
    font-size:16px;outline:none;padding:2px 0;
  }
  .name-row input::placeholder{color:var(--text-faint);}
  .name-hint{font-size:12px;color:var(--warn);margin:0 0 24px 2px;}
  .name-hint.ok{color:var(--text-faint);}

  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .weeknav .label{font-size:16px;font-weight:600;}
  .weeknav .arrows{display:flex;gap:4px;}
  .weeknav button{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:hover:not(:disabled){color:var(--text);border-color:var(--text-faint);}
  .window-note{font-size:13px;color:var(--text-faint);margin-bottom:18px;}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  @media (max-width:640px){
    .grid{grid-template-columns:repeat(7,minmax(78px,1fr));overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
  }
  .grid.grid-scroll{
    display:flex;overflow-x:auto;scroll-snap-type:x proximity;
    gap:8px;padding-bottom:10px;-webkit-overflow-scrolling:touch;
  }
  .grid.grid-scroll .day-col{min-width:80px;scroll-snap-align:start;flex-shrink:0;}

  .day-col{display:flex;flex-direction:column;gap:7px;min-height:110px;}
  .day-head{text-align:center;padding-bottom:9px;border-bottom:2px solid var(--border);margin-bottom:2px;}
  .day-head .d{font-size:11px;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;font-weight:600;}
  .day-head .n{font-size:17px;font-weight:700;margin-top:2px;}
  .day-col.today .day-head .n{color:var(--accent-dark);}
  .day-col.today .day-head{border-bottom-color:var(--accent);}

  .chip{border-radius:9px;padding:9px 8px;font-size:12.5px;border:1.5px solid transparent;}
  .chip .time{font-weight:700;font-size:13px;}
  .chip .meta{font-size:11px;margin-top:2px;font-weight:500;}
  .chip.open{border-color:var(--accent);color:var(--accent-dark);cursor:pointer;background:var(--accent-soft);}
  .chip.open:hover{background:#D4F0E2;}
  .chip.open .time{color:var(--accent-dark);}
  .chip.open .meta{color:var(--accent-dark);opacity:0.8;}
  .chip.booked{background:var(--surface);border-color:var(--border);color:var(--text-dim);}
  .chip.booked .time{color:var(--text-dim);}
  .none{color:var(--text-faint);font-size:12px;text-align:center;padding-top:14px;}

  .legend{display:flex;gap:20px;margin-top:30px;padding-top:18px;border-top:1px solid var(--border);}
  .legend .item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-dim);}
  .dot{width:9px;height:9px;border-radius:50%;}
  .dot.open{background:var(--accent);}
  .dot.booked{background:var(--text-faint);}

  .context-card{
    background:var(--accent-soft);border:1px solid #CDEEDD;border-radius:12px;
    padding:13px 15px;margin-bottom:24px;font-size:14px;color:var(--accent-dark);
  }
  .context-card strong{font-weight:700;}

  .type-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .type-option{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
    padding:14px 15px;cursor:pointer;font-size:15px;font-weight:500;
  }
  .type-option:hover{border-color:var(--text-faint);}
  .type-option.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark);}
  .type-option .ring{
    width:18px;height:18px;border-radius:50%;border:2px solid var(--text-faint);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .type-option.selected .ring{border-color:var(--accent);}
  .type-option.selected .ring::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--accent);}

  .field{margin-bottom:20px;}
  .field label{font-size:13px;color:var(--text-dim);display:block;margin-bottom:7px;font-weight:500;}
  .field input{
    width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);
    padding:12px 13px;border-radius:10px;font-family:inherit;font-size:15px;
  }
  .field input::placeholder{color:var(--text-faint);}
  .field input:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .summary{
    background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
    padding:6px 16px;margin-bottom:24px;
  }
  .summary-row{display:flex;justify-content:space-between;padding:12px 0;font-size:14px;}
  .summary-row + .summary-row{border-top:1px solid var(--border);}
  .summary-row .k{color:var(--text-dim);}
  .summary-row .v{color:var(--text);font-weight:600;text-align:right;}

  .btn{
    display:block;
    font-family:inherit;font-size:15px;font-weight:600;border-radius:10px;
    padding:13px 16px;cursor:pointer;border:1.5px solid transparent;width:100%;
    text-align:center;text-decoration:none;box-sizing:border-box;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover:not(:disabled){background:var(--accent-dark);}
  .btn-primary:disabled{background:var(--text-faint);cursor:not-allowed;}
  .btn-ghost{background:none;border-color:var(--border);color:var(--text-dim);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}

  .success{text-align:center;padding:30px 0 10px;}
  .success .mark{
    width:56px;height:56px;border-radius:50%;background:var(--accent-soft);
    color:var(--accent-dark);display:flex;align-items:center;justify-content:center;
    font-size:26px;margin:0 auto 18px;
  }
  .success h2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin:0 0 8px;}
  .success p{color:var(--text-dim);font-size:14px;margin:0 0 28px;}

  .toast{
    position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;padding:11px 18px;border-radius:8px;
    font-size:14px;font-weight:600;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,0.15);
  }
  .loading{text-align:center;padding:60px 0;color:var(--text-faint);font-size:14px;}

  .music-widget{
    position:fixed;bottom:16px;right:16px;z-index:60;
    display:flex;flex-direction:column;align-items:flex-end;gap:10px;
  }
  .music-toggle{
    background:var(--text);color:#fff;border:none;border-radius:30px;
    padding:11px 16px;font-family:inherit;font-size:13px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
  }
  .music-panel{
    width:min(280px, calc(100vw - 32px));
    background:#fff;border:1px solid var(--border);border-radius:14px;
    padding:12px;box-shadow:0 10px 30px rgba(0,0,0,0.15);
  }
  .music-panel .cap{font-size:11px;color:var(--text-dim);margin-bottom:8px;text-align:center;}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading the schedule…</div></div>

<div class="music-widget" id="musicWidget"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtT30zmqBS8tPFpenQsK2WH-fltK9zMPY",
  authDomain: "guides-cuts.firebaseapp.com",
  projectId: "guides-cuts",
  storageBucket: "guides-cuts.firebasestorage.app",
  messagingSenderId: "893275987355",
  appId: "1:893275987355:web:6c300a821d58cfdca5d53e",
  measurementId: "G-2RZNRSSE1C"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

if(window.emailjs){ window.emailjs.init({ publicKey: "UKIijA7HT4OuNYwhQ" }); }

window.storage = {
  async get(key, shared){
    const snap = await getDoc(doc(db, 'kv', key));
    if(!snap.exists()) throw new Error('not found');
    return { key, value: snap.data().value, shared: !!shared };
  },
  async set(key, value, shared){
    await setDoc(doc(db, 'kv', key), { value });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    await deleteDoc(doc(db, 'kv', key));
    return { key, deleted:true, shared: !!shared };
  }
};

(function(){
  const app = document.getElementById('app');
  const HAIRCUT_TYPES = ['Scissor Cut','Fade','Scissor Cut & Fade','Buzz Cut','Design / Pattern','Other'];

  let schedule = [];
  let clientName = '';
  let clientContactMethod = 'Phone';
  let clientContactValue = '';
  let weekStart = mondayOf(new Date());
  let toastMsg = null;
  let toastTimer = null;

  let step = 'pick';
  let pendingSlotId = null;
  let pendingType = '';
  let pendingNote = '';
  let pendingPhoto = '';

  function mondayOf(d){
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = (day===0? -6 : 1) - day;
    dt.setDate(dt.getDate()+diff);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function iso(d){ return d.toISOString().slice(0,10); }
  function addDays(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }
  function todayIso(){ return iso(new Date()); }
  function fmtTime(t){
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM'; const hh=((h+11)%12)+1;
    return hh+':'+String(m).padStart(2,'0')+' '+ampm;
  }
  function fmtRange(start){
    const end=addDays(start,6); const opts={month:'short',day:'numeric'};
    return start.toLocaleDateString(undefined,opts)+' – '+end.toLocaleDateString(undefined,opts);
  }
  function fmtFull(dateStr,time){
    const d=new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})+' · '+fmtTime(time);
  }

  function showToast(msg){
    toastMsg=msg; render();
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{toastMsg=null; render();},2600);
  }

  function contactPlaceholder(){
    switch(clientContactMethod){
      case 'Phone': return 'e.g. 0433 137 811';
      case 'Snapchat': return 'your Snapchat username';
      case 'Instagram': return 'your Instagram handle';
      case 'Email': return 'you@example.com';
      default: return '';
    }
  }

  async function loadSchedule(){
    try{
      const s = await window.storage.get('schedule', true);
      schedule = s? JSON.parse(s.value) : [];
    }catch(e){ schedule = []; }
    render();
    renderMusicWidget();
  }
  async function saveSchedule(){
    try{ await window.storage.set('schedule', JSON.stringify(schedule), true); }
    catch(e){ showToast("Couldn't save — try again"); }
  }

  async function confirmBooking(){
    const slot = schedule.find(s=>s.id===pendingSlotId);
    if(!slot || slot.status!=='open'){ showToast('That slot just got taken'); step='pick'; pendingSlotId=null; render(); return; }
    slot.status='booked'; slot.clientName=clientName.trim(); slot.haircutType=pendingType; slot.note=pendingNote.trim(); slot.photo=pendingPhoto;
    slot.contactMethod=clientContactMethod; slot.contactValue=clientContactValue.trim();
    await saveSchedule();
    sendBookingEmail(slot);
    step='success';
    render();
  }

  function sendBookingEmail(slot){
    if(!window.emailjs) return;
    window.emailjs.send('service_fyk9tkb', 'template_c6m42w2', {
      client_name: slot.clientName,
      when: fmtFull(slot.date, slot.time),
      haircut_type: slot.haircutType || '',
      notes: slot.note || 'None',
      contact: (slot.contactMethod||'')+' — '+(slot.contactValue||''),
      dashboard_link: 'https://guidescuts.github.io/Guides/barber.html'
    }).catch(()=>{ /* booking already saved either way; email is best-effort */ });
  }

  function render(){
    app.innerHTML='';
    if(step==='pick') app.appendChild(renderPick());
    else if(step==='type') app.appendChild(renderType());
    else if(step==='confirm') app.appendChild(renderConfirm());
    else if(step==='success') app.appendChild(renderSuccess());

    if(toastMsg){
      const t=document.createElement('div'); t.className='toast'; t.textContent=toastMsg;
      app.appendChild(t);
    }
  }

  function stepDots(activeIndex){
    const wrap=document.createElement('div'); wrap.className='step-dots';
    for(let i=0;i<3;i++){
      const dot=document.createElement('span');
      if(i<activeIndex) dot.className='done';
      else if(i===activeIndex) dot.className='active';
      wrap.appendChild(dot);
    }
    return wrap;
  }

  function brandRow(){
    const row=document.createElement('div'); row.className='brand-row';
    row.innerHTML=`
      <svg class="brand-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="200" height="200" rx="44" fill="#1FA971"/>
        <g stroke="#ffffff" stroke-width="9" stroke-linecap="round">
          <line x1="100" y1="100" x2="100" y2="18"/>
          <line x1="100" y1="100" x2="171" y2="59"/>
          <line x1="100" y1="100" x2="171" y2="141"/>
          <line x1="100" y1="100" x2="100" y2="182"/>
          <line x1="100" y1="100" x2="29" y2="141"/>
          <line x1="100" y1="100" x2="29" y2="59"/>
        </g>
        <circle cx="100" cy="100" r="9" fill="#ffffff"/>
      </svg>
      <div class="wordmark">Guides Cuts</div>
    `;
    return row;
  }

  // ---- Step 1: pick a time ----
  function renderPick(){
    const wrap=document.createElement('div');

    wrap.appendChild(brandRow());
    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Pick a time for your cut';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(0));

    const priceRow=document.createElement('div'); priceRow.className='price-row';
    priceRow.innerHTML=`
      <div class="price-pill"><div class="amount">$10</div><div class="who">Baxter residents</div></div>
      <div class="price-pill"><div class="amount">$15</div><div class="who">Outside guests</div></div>
    `;
    wrap.appendChild(priceRow);

    const nameRow=document.createElement('div');
    nameRow.className='name-row'+(clientName.trim()? ' filled':'');
    nameRow.innerHTML=`<label><span class="req">*</span> Your name</label>`;
    const nameInput=document.createElement('input');
    nameInput.placeholder='E.g. James the Therapist';
    nameInput.value=clientName;
    nameInput.oninput=(e)=>{
      clientName=e.target.value;
      nameRow.className='name-row'+(clientName.trim()? ' filled':'');
      hint.className='name-hint'+(clientName.trim()? ' ok':'');
      hint.textContent = clientName.trim()? 'Looks good.' : 'Required';
    };
    nameRow.appendChild(nameInput);
    wrap.appendChild(nameRow);

    const hint=document.createElement('div');
    hint.className='name-hint'+(clientName.trim()? ' ok':'');
    hint.textContent = clientName.trim()? 'Looks good.' : 'Required';
    wrap.appendChild(hint);

    const contactRow=document.createElement('div');
    contactRow.className='name-row'+(clientContactValue.trim()? ' filled':'');
    contactRow.style.marginTop='10px';
    contactRow.innerHTML=`<label><span class="req">*</span> How can we reach you?</label>`;
    const contactInner=document.createElement('div');
    contactInner.style.cssText='display:flex;gap:8px;';
    const methodSelect=document.createElement('select');
    methodSelect.style.cssText='background:transparent;border:none;color:var(--text);font-family:inherit;font-size:15px;font-weight:600;outline:none;flex-shrink:0;';
    ['Phone','Snapchat','Instagram','Email'].forEach(m=>{
      const o=document.createElement('option'); o.value=m; o.textContent=m;
      if(m===clientContactMethod) o.selected=true;
      methodSelect.appendChild(o);
    });
    methodSelect.onchange=(e)=>{ clientContactMethod=e.target.value; contactValueInput.placeholder=contactPlaceholder(); };
    const contactValueInput=document.createElement('input');
    contactValueInput.value=clientContactValue;
    contactValueInput.placeholder=contactPlaceholder();
    contactValueInput.style.cssText='flex:1;';
    contactValueInput.oninput=(e)=>{
      clientContactValue=e.target.value;
      contactRow.className='name-row'+(clientContactValue.trim()? ' filled':'');
      contactHint.className='name-hint'+(clientContactValue.trim()? ' ok':'');
      contactHint.textContent = clientContactValue.trim()? 'Looks good.' : 'Required';
    };
    contactInner.appendChild(methodSelect);
    contactInner.appendChild(contactValueInput);
    contactRow.appendChild(contactInner);
    wrap.appendChild(contactRow);

    const contactHint=document.createElement('div');
    contactHint.className='name-hint'+(clientContactValue.trim()? ' ok':'');
    contactHint.textContent = clientContactValue.trim()? 'Looks good.' : 'Required';
    wrap.appendChild(contactHint);

    const isMobile = window.matchMedia('(max-width:640px)').matches;
    const currentWeekStart=mondayOf(new Date());
    const lastWeekStart=addDays(currentWeekStart,14);

    if(!isMobile){
      const nav=document.createElement('div'); nav.className='weeknav';
      nav.innerHTML=`<div class="label">${fmtRange(weekStart)}</div>`;
      const arrows=document.createElement('div'); arrows.className='arrows';
      const prev=document.createElement('button'); prev.textContent='‹';
      const atStart=iso(weekStart)===iso(currentWeekStart);
      prev.disabled=atStart; if(atStart) prev.style.opacity='0.35';
      prev.onclick=()=>{ if(!atStart){ weekStart=addDays(weekStart,-7); render(); } };
      const next=document.createElement('button'); next.textContent='›';
      const atEnd=iso(weekStart)===iso(lastWeekStart);
      next.disabled=atEnd; if(atEnd) next.style.opacity='0.35';
      next.onclick=()=>{ if(!atEnd){ weekStart=addDays(weekStart,7); render(); } };
      arrows.appendChild(prev); arrows.appendChild(next);
      nav.appendChild(arrows);
      wrap.appendChild(nav);
    } else {
      const nav=document.createElement('div'); nav.className='weeknav';
      nav.innerHTML=`<div class="label">${fmtRange(currentWeekStart).split(' – ')[0]} – ${fmtRange(lastWeekStart).split(' – ')[1]}</div>`;
      wrap.appendChild(nav);
    }

    const windowNote=document.createElement('div'); windowNote.className='window-note';
    windowNote.textContent = isMobile
      ? 'Swipe sideways to see all three weeks'
      : 'Booking is open up to three weeks out';
    wrap.appendChild(windowNote);

    const updateNote=document.createElement('div'); updateNote.className='window-note';
    updateNote.style.marginTop='-14px';
    updateNote.textContent='Heads up — this schedule rolls forward each week, so new openings appear automatically once the current week ends.';
    wrap.appendChild(updateNote);

    const grid=document.createElement('div'); grid.className='grid'+(isMobile? ' grid-scroll':'');
    const dayNames=['MON','TUE','WED','THU','FRI','SAT','SUN'];
    const totalDays = isMobile? 21 : 7;
    const rangeStart = isMobile? currentWeekStart : weekStart;
    for(let i=0;i<totalDays;i++){
      const date=addDays(rangeStart,i);
      const dateIso=iso(date);
      const col=document.createElement('div');
      col.className='day-col'+(dateIso===todayIso()?' today':'');
      const headDiv=document.createElement('div'); headDiv.className='day-head';
      headDiv.innerHTML=`<div class="d">${dayNames[date.getDay()===0?6:date.getDay()-1]}</div><div class="n">${date.getDate()}</div>`;
      col.appendChild(headDiv);

      const daySlots=schedule.filter(s=>s.date===dateIso).sort((a,b)=>a.time.localeCompare(b.time));
      if(daySlots.length===0){
        const none=document.createElement('div'); none.className='none'; none.textContent='—';
        col.appendChild(none);
      } else {
        daySlots.forEach(slot=>{
          const chip=document.createElement('div');
          chip.className='chip '+slot.status;
          if(slot.status==='open'){
            chip.innerHTML=`<div class="time">${fmtTime(slot.time)}</div><div class="meta">open</div>`;
            chip.onclick=()=>{
              if(!clientName.trim()){ showToast('Add your name up top first'); return; }
              if(!clientContactValue.trim()){ showToast('Add how we can reach you first'); return; }
              pendingSlotId=slot.id; step='type'; render();
            };
          } else {
            chip.innerHTML=`<div class="time">${fmtTime(slot.time)}</div><div class="meta">Booked</div>`;
          }
          col.appendChild(chip);
        });
      }
      grid.appendChild(col);
    }
    wrap.appendChild(grid);

    const legend=document.createElement('div'); legend.className='legend';
    legend.innerHTML=`
      <div class="item"><span class="dot open"></span>Open slot</div>
      <div class="item"><span class="dot booked"></span>Booked</div>
    `;
    wrap.appendChild(legend);
    return wrap;
  }

  // ---- Step 2: haircut type ----
  function renderType(){
    const wrap=document.createElement('div');
    const slot=schedule.find(s=>s.id===pendingSlotId);

    const top=document.createElement('div'); top.className='topbar';
    const back=document.createElement('button'); back.className='back'; back.innerHTML='‹ Back';
    back.onclick=()=>{ step='pick'; pendingSlotId=null; render(); };
    top.appendChild(back);
    wrap.appendChild(top);

    wrap.appendChild(brandRow());
    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='What kind of cut?';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(1));

    const ctx=document.createElement('div'); ctx.className='context-card';
    ctx.innerHTML=`Booking for <strong>${fmtFull(slot.date, slot.time)}</strong>`;
    wrap.appendChild(ctx);

    const list=document.createElement('div'); list.className='type-list';
    HAIRCUT_TYPES.forEach(t=>{
      const opt=document.createElement('div');
      opt.className='type-option'+(pendingType===t?' selected':'');
      opt.innerHTML=`<span class="ring"></span><span>${t}</span>`;
      opt.onclick=()=>{ pendingType=t; render(); };
      list.appendChild(opt);
    });
    wrap.appendChild(list);

    const noteField=document.createElement('div'); noteField.className='field';
    noteField.innerHTML=`<label>Notes (optional)</label>`;
    const noteInput=document.createElement('input');
    noteInput.placeholder='e.g. keep the sides tight';
    noteInput.value=pendingNote;
    noteInput.oninput=(e)=>{ pendingNote=e.target.value; };
    noteField.appendChild(noteInput);
    wrap.appendChild(noteField);

    const photoField=document.createElement('div'); photoField.className='field';
    photoField.innerHTML=`<label>Reference photo (optional)</label>`;
    const photoInput=document.createElement('input');
    photoInput.type='file';
    photoInput.accept='image/*';
    photoInput.style.cssText='padding:9px;font-size:13px;';
    const preview=document.createElement('div');
    preview.style.cssText='margin-top:10px;';
    if(pendingPhoto){
      preview.innerHTML=`<img src="${pendingPhoto}" style="max-width:140px;border-radius:10px;border:1.5px solid var(--border);display:block;">
        <button type="button" style="margin-top:6px;background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;text-decoration:underline;">Remove photo</button>`;
      preview.querySelector('button').onclick=()=>{ pendingPhoto=''; render(); };
    }
    photoInput.onchange=(e)=>{
      const file=e.target.files[0];
      if(!file) return;
      const img=new Image();
      const reader=new FileReader();
      reader.onload=(ev)=>{
        img.onload=()=>{
          const maxDim=500;
          const scale=Math.min(1, maxDim/Math.max(img.width,img.height));
          const canvas=document.createElement('canvas');
          canvas.width=img.width*scale; canvas.height=img.height*scale;
          const ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          pendingPhoto=canvas.toDataURL('image/jpeg',0.6);
          render();
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    photoField.appendChild(photoInput);
    photoField.appendChild(preview);
    wrap.appendChild(photoField);

    const continueBtn=document.createElement('button');
    continueBtn.className='btn btn-primary';
    continueBtn.textContent='Continue';
    continueBtn.disabled=!pendingType;
    continueBtn.onclick=()=>{ if(pendingType){ step='confirm'; render(); } };
    wrap.appendChild(continueBtn);

    return wrap;
  }

  // ---- Step 3: confirm ----
  function renderConfirm(){
    const wrap=document.createElement('div');
    const slot=schedule.find(s=>s.id===pendingSlotId);

    const top=document.createElement('div'); top.className='topbar';
    const back=document.createElement('button'); back.className='back'; back.innerHTML='‹ Back';
    back.onclick=()=>{ step='type'; render(); };
    top.appendChild(back);
    wrap.appendChild(top);

    wrap.appendChild(brandRow());
    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Confirm your booking';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(2));

    const summary=document.createElement('div'); summary.className='summary';
    const rows=[
      ['Name', clientName.trim()],
      ['Contact', clientContactMethod+' — '+clientContactValue.trim()],
      ['When', fmtFull(slot.date, slot.time)],
      ['Haircut', pendingType],
      ['Notes', pendingNote || '—']
    ];
    rows.forEach(([k,v])=>{
      const r=document.createElement('div'); r.className='summary-row';
      r.innerHTML=`<span class="k">${k}</span><span class="v">${escapeHtml(v)}</span>`;
      summary.appendChild(r);
    });
    wrap.appendChild(summary);

    if(pendingPhoto){
      const photoPreview=document.createElement('img');
      photoPreview.src=pendingPhoto;
      photoPreview.style.cssText='max-width:140px;border-radius:10px;border:1.5px solid var(--border);display:block;margin:-12px 0 24px;';
      wrap.appendChild(photoPreview);
    }

    const confirmBtn=document.createElement('button');
    confirmBtn.className='btn btn-primary';
    confirmBtn.textContent='Confirm booking';
    confirmBtn.onclick=confirmBooking;
    wrap.appendChild(confirmBtn);

    return wrap;
  }

  // ---- Step 4: success ----
  function renderSuccess(){
    const wrap=document.createElement('div');
    wrap.appendChild(brandRow());

    const s=document.createElement('div'); s.className='success';
    s.innerHTML=`
      <div class="mark">✓</div>
      <h2>You're booked</h2>
      <p>See you then — the barber can see your booking on their end.<br>Need to get in touch? Call or text <strong>0433 137 811</strong>.</p>
    `;
    wrap.appendChild(s);

    const actions=document.createElement('div');
    actions.style.cssText='display:flex;flex-direction:column;gap:10px;';

    const slot = schedule.find(s=>s.id===pendingSlotId);
    if(slot){
      const cal=document.createElement('a');
      cal.className='btn btn-ghost';
      cal.textContent='Add to Google Calendar';
      cal.target='_blank';
      cal.rel='noopener';
      cal.href=googleCalendarUrl(slot);
      actions.appendChild(cal);
    }

    const again=document.createElement('button');
    again.className='btn btn-ghost';
    again.textContent='Book another slot';
    again.onclick=()=>{
      pendingSlotId=null; pendingType=''; pendingNote=''; pendingPhoto='';
      step='pick'; render();
    };
    actions.appendChild(again);

    wrap.appendChild(actions);

    return wrap;
  }

  function escapeHtml(str){
    const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML;
  }

  function googleCalendarUrl(slot){
    const [h,m] = slot.time.split(':').map(Number);
    const start = new Date(slot.date+'T00:00:00');
    start.setHours(h,m,0,0);
    const end = new Date(start.getTime() + slot.duration*60000);
    const fmt = (d)=> d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const text = encodeURIComponent('Haircut — Guides Cuts');
    const details = encodeURIComponent((slot.haircutType||'')+(slot.note? ' — "'+slot.note+'"':''));
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${fmt(start)}/${fmt(end)}&details=${details}`;
  }

  // ---- music widget ----
  function renderMusicWidget(){
    const widget = document.getElementById('musicWidget');
    let open = window.matchMedia('(min-width:640px)').matches;
    function paint(){
      widget.innerHTML='';
      if(open){
        const panel=document.createElement('div'); panel.className='music-panel';
        panel.innerHTML=`<div class="cap">🎵 Skepta — tap play to start</div>`;
        const iframe=document.createElement('iframe');
        iframe.src='https://open.spotify.com/embed/artist/2p1fiYHYiXz9qi0JJyxBzN';
        iframe.width='100%'; iframe.height='152'; iframe.frameBorder='0';
        iframe.allow='autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
        iframe.loading='lazy';
        iframe.style.borderRadius='10px';
        panel.appendChild(iframe);
        widget.appendChild(panel);
      }
      const toggle=document.createElement('button');
      toggle.className='music-toggle';
      toggle.innerHTML = open? '✕ Close' : '🎵 Play music';
      toggle.onclick=()=>{ open=!open; paint(); };
      widget.appendChild(toggle);
    }
    paint();
  }

  loadSchedule();
})();
</script>
</body>
</html>
