<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guides Cuts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101114;
    --surface:#17181C;
    --surface-hover:#1D1F24;
    --border:#2A2C31;
    --text:#EDEDEF;
    --text-dim:#8B8D94;
    --text-faint:#54565D;
    --accent:#3ECF8E;
    --accent-dim:#1F5E43;
    --danger:#D9695F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:640px;margin:0 auto;padding:40px 20px 80px;}

  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .back{
    background:none;border:none;color:var(--text-dim);cursor:pointer;
    font-size:13px;font-family:inherit;padding:4px 0;display:flex;align-items:center;gap:5px;
  }
  .back:hover{color:var(--text);}
  .wordmark{font-size:19px;font-weight:600;letter-spacing:-0.2px;}
  .subtitle{color:var(--text-dim);font-size:13px;margin-top:4px;margin-bottom:28px;}

  .step-dots{display:flex;gap:6px;margin-bottom:28px;}
  .step-dots span{width:22px;height:3px;border-radius:2px;background:var(--border);}
  .step-dots span.done{background:var(--accent-dim);}
  .step-dots span.active{background:var(--accent);}

  .name-row{
    display:flex;align-items:center;gap:10px;margin-bottom:26px;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;
  }
  .name-row label{font-size:12px;color:var(--text-dim);white-space:nowrap;}
  .name-row input{
    flex:1;background:none;border:none;color:var(--text);font-family:inherit;
    font-size:13px;outline:none;
  }
  .name-row input::placeholder{color:var(--text-faint);}

  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .weeknav .label{font-size:14px;font-weight:500;}
  .weeknav .arrows{display:flex;gap:4px;}
  .weeknav button{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:hover:not(:disabled){color:var(--text);border-color:var(--text-faint);}
  .window-note{font-size:12px;color:var(--text-faint);margin-bottom:18px;}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  @media (max-width:640px){
    .grid{grid-template-columns:repeat(7,minmax(84px,1fr));overflow-x:auto;padding-bottom:6px;}
  }

  .day-col{display:flex;flex-direction:column;gap:8px;min-height:120px;}
  .day-head{text-align:center;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:2px;}
  .day-head .d{font-size:11px;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;}
  .day-head .n{font-size:16px;font-weight:500;margin-top:2px;}
  .day-col.today .day-head .n{color:var(--accent);}
  .day-col.today .day-head{border-bottom-color:var(--accent);}

  .chip{border-radius:7px;padding:8px 9px;font-size:12px;border:1px solid transparent;}
  .chip .time{font-weight:500;font-size:12px;}
  .chip .meta{font-size:11px;margin-top:2px;}
  .chip.open{border-color:var(--accent-dim);color:var(--accent);cursor:pointer;background:transparent;}
  .chip.open:hover{background:rgba(62,207,142,0.08);}
  .chip.open .time{color:var(--accent);}
  .chip.open .meta{color:#2f8f68;}
  .chip.booked{background:var(--surface);border-color:var(--border);}
  .chip.booked .time{color:var(--text);}
  .chip.booked .meta{color:var(--text-dim);}
  .none{color:var(--text-faint);font-size:12px;text-align:center;padding-top:16px;}

  .legend{display:flex;gap:20px;margin-top:34px;padding-top:18px;border-top:1px solid var(--border);}
  .legend .item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.open{background:none;border:1.5px solid var(--accent);}
  .dot.booked{background:var(--text-faint);}

  .context-card{
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;margin-bottom:26px;font-size:13px;color:var(--text-dim);
  }
  .context-card strong{color:var(--text);font-weight:500;}

  .type-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .type-option{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:13px 14px;cursor:pointer;font-size:14px;
  }
  .type-option:hover{border-color:var(--text-faint);}
  .type-option.selected{border-color:var(--accent);background:rgba(62,207,142,0.06);}
  .type-option .ring{
    width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text-faint);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .type-option.selected .ring{border-color:var(--accent);}
  .type-option.selected .ring::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);}

  .field{margin-bottom:20px;}
  .field label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:7px;}
  .field input{
    width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:8px;font-family:inherit;font-size:13px;
  }
  .field input::placeholder{color:var(--text-faint);}
  .field input:focus{outline:1px solid var(--accent);}

  .summary{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:16px;margin-bottom:24px;
  }
  .summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;}
  .summary-row + .summary-row{border-top:1px solid var(--border);}
  .summary-row .k{color:var(--text-dim);}
  .summary-row .v{color:var(--text);font-weight:500;text-align:right;}

  .btn{
    font-family:inherit;font-size:13px;font-weight:500;border-radius:7px;
    padding:11px 16px;cursor:pointer;border:1px solid transparent;width:100%;
  }
  .btn-primary{background:var(--accent);color:#08130E;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.05);}
  .btn-primary:disabled{background:var(--text-faint);color:var(--bg);cursor:not-allowed;}
  .btn-ghost{background:none;border-color:var(--border);color:var(--text-dim);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}

  .success{text-align:center;padding:30px 0 10px;}
  .success .mark{
    width:52px;height:52px;border-radius:50%;border:2px solid var(--accent);
    color:var(--accent);display:flex;align-items:center;justify-content:center;
    font-size:24px;margin:0 auto 18px;
  }
  .success h2{font-size:18px;font-weight:500;margin:0 0 8px;}
  .success p{color:var(--text-dim);font-size:13px;margin:0 0 28px;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--text);color:var(--bg);padding:10px 18px;border-radius:6px;
    font-size:13px;font-weight:500;z-index:50;
  }
  .loading{text-align:center;padding:60px 0;color:var(--text-faint);font-size:13px;}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading the schedule…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtT30zmqBS8tPFpenQsK2WH-fltK9zMPY",
  authDomain: "guides-cuts.firebaseapp.com",
  projectId: "guides-cuts",
  storageBucket: "guides-cuts.firebasestorage.app",
  messagingSenderId: "893275987355",
  appId: "1:893275987355:web:6c300a821d58cfdca5d53e",
  measurementId: "G-2RZNRSSE1C"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

window.storage = {
  async get(key, shared){
    const snap = await getDoc(doc(db, 'kv', key));
    if(!snap.exists()) throw new Error('not found');
    return { key, value: snap.data().value, shared: !!shared };
  },
  async set(key, value, shared){
    await setDoc(doc(db, 'kv', key), { value });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    await deleteDoc(doc(db, 'kv', key));
    return { key, deleted:true, shared: !!shared };
  }
};

(function(){
  const app = document.getElementById('app');
  const HAIRCUT_TYPES = ['Simple trim','Skin fade','Design / pattern','Beard trim','Trim + beard','Other'];

  let schedule = [];
  let clientName = '';
  let weekStart = mondayOf(new Date());
  let toastMsg = null;
  let toastTimer = null;

  let step = 'pick';
  let pendingSlotId = null;
  let pendingType = '';
  let pendingNote = '';

  function mondayOf(d){
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = (day===0? -6 : 1) - day;
    dt.setDate(dt.getDate()+diff);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function iso(d){ return d.toISOString().slice(0,10); }
  function addDays(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }
  function todayIso(){ return iso(new Date()); }
  function fmtTime(t){
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM'; const hh=((h+11)%12)+1;
    return hh+':'+String(m).padStart(2,'0')+' '+ampm;
  }
  function fmtRange(start){
    const end=addDays(start,6); const opts={month:'short',day:'numeric'};
    return start.toLocaleDateString(undefined,opts)+' – '+end.toLocaleDateString(undefined,opts);
  }
  function fmtFull(dateStr,time){
    const d=new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})+' · '+fmtTime(time);
  }
  function id(){ return 't'+Date.now()+Math.random().toString(36).slice(2,7); }

  function showToast(msg){
    toastMsg=msg; render();
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>{toastMsg=null; render();},2600);
  }

  async function loadSchedule(){
    try{
      const s = await window.storage.get('schedule', true);
      schedule = s? JSON.parse(s.value) : [];
    }catch(e){ schedule = []; }
    render();
  }
  async function saveSchedule(){
    try{ await window.storage.set('schedule', JSON.stringify(schedule), true); }
    catch(e){ showToast("Couldn't save — try again"); }
  }

  function seedPlaceholderWeeks(){
    const mon = mondayOf(new Date());
    const pattern = [
      {offset:0, times:['14:00','16:30']},
      {offset:1, times:['11:00']},
      {offset:3, times:['13:00','14:00','16:30']},
      {offset:4, times:['17:00']},
      {offset:5, times:['12:00','13:30']},
      {offset:7, times:['14:00','16:00']},
      {offset:8, times:['11:00','15:30']},
      {offset:10, times:['13:00','14:00']},
      {offset:11, times:['17:00']},
      {offset:12, times:['12:00','13:30','16:00']}
    ];
    const slots=[];
    pattern.forEach(p=>{
      const date = iso(addDays(mon,p.offset));
      p.times.forEach(time=> slots.push({id:id(), date, time, duration:30, status:'open', clientName:'', haircutType:'', note:''}));
    });
    return slots;
  }

  async function confirmBooking(){
    const slot = schedule.find(s=>s.id===pendingSlotId);
    if(!slot || slot.status!=='open'){ showToast('That slot just got taken'); step='pick'; pendingSlotId=null; render(); return; }
    slot.status='booked'; slot.clientName=clientName.trim(); slot.haircutType=pendingType; slot.note=pendingNote.trim();
    await saveSchedule();
    step='success';
    render();
  }

  function render(){
    app.innerHTML='';
    if(step==='pick') app.appendChild(renderPick());
    else if(step==='type') app.appendChild(renderType());
    else if(step==='confirm') app.appendChild(renderConfirm());
    else if(step==='success') app.appendChild(renderSuccess());

    if(toastMsg){
      const t=document.createElement('div'); t.className='toast'; t.textContent=toastMsg;
      app.appendChild(t);
    }
  }

  function stepDots(activeIndex){
    const wrap=document.createElement('div'); wrap.className='step-dots';
    for(let i=0;i<3;i++){
      const dot=document.createElement('span');
      if(i<activeIndex) dot.className='done';
      else if(i===activeIndex) dot.className='active';
      wrap.appendChild(dot);
    }
    return wrap;
  }

  // ---- Step 1: pick a time ----
  function renderPick(){
    const wrap=document.createElement('div');

    const top=document.createElement('div'); top.className='topbar';
    top.innerHTML=`<div class="wordmark">Guides Cuts</div>`;
    wrap.appendChild(top);

    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Step 1 · Pick a time for your cut';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(0));

    const nameRow=document.createElement('div'); nameRow.className='name-row';
    nameRow.innerHTML=`<label>Your name</label>`;
    const nameInput=document.createElement('input');
    nameInput.placeholder='e.g. Alex from Room 214';
    nameInput.value=clientName;
    nameInput.oninput=(e)=>{ clientName=e.target.value; };
    nameRow.appendChild(nameInput);
    wrap.appendChild(nameRow);

    const currentWeekStart=mondayOf(new Date());
    const lastWeekStart=addDays(currentWeekStart,7);

    const nav=document.createElement('div'); nav.className='weeknav';
    nav.innerHTML=`<div class="label">${fmtRange(weekStart)}</div>`;
    const arrows=document.createElement('div'); arrows.className='arrows';
    const prev=document.createElement('button'); prev.textContent='‹';
    const atStart=iso(weekStart)===iso(currentWeekStart);
    prev.disabled=atStart; if(atStart) prev.style.opacity='0.35';
    prev.onclick=()=>{ if(!atStart){ weekStart=addDays(weekStart,-7); render(); } };
    const next=document.createElement('button'); next.textContent='›';
    const atEnd=iso(weekStart)===iso(lastWeekStart);
    next.disabled=atEnd; if(atEnd) next.style.opacity='0.35';
    next.onclick=()=>{ if(!atEnd){ weekStart=addDays(weekStart,7); render(); } };
    arrows.appendChild(prev); arrows.appendChild(next);
    nav.appendChild(arrows);
    wrap.appendChild(nav);

    const windowNote=document.createElement('div'); windowNote.className='window-note';
    windowNote.textContent='Booking is open up to two weeks out';
    wrap.appendChild(windowNote);

    const grid=document.createElement('div'); grid.className='grid';
    const dayNames=['MON','TUE','WED','THU','FRI','SAT','SUN'];
    for(let i=0;i<7;i++){
      const date=addDays(weekStart,i);
      const dateIso=iso(date);
      const col=document.createElement('div');
      col.className='day-col'+(dateIso===todayIso()?' today':'');
      const headDiv=document.createElement('div'); headDiv.className='day-head';
      headDiv.innerHTML=`<div class="d">${dayNames[i]}</div><div class="n">${date.getDate()}</div>`;
      col.appendChild(headDiv);

      const daySlots=schedule.filter(s=>s.date===dateIso).sort((a,b)=>a.time.localeCompare(b.time));
      if(daySlots.length===0){
        const none=document.createElement('div'); none.className='none'; none.textContent='—';
        col.appendChild(none);
      } else {
        daySlots.forEach(slot=>{
          const chip=document.createElement('div');
          chip.className='chip '+slot.status;
          if(slot.status==='open'){
            chip.innerHTML=`<div class="time">${fmtTime(slot.time)}</div><div class="meta">open</div>`;
            chip.onclick=()=>{
              if(!clientName.trim()){ showToast('Add your name up top first'); return; }
              pendingSlotId=slot.id; step='type'; render();
            };
          } else {
            chip.innerHTML=`<div class="time">${fmtTime(slot.time)}</div><div class="meta">Booked</div>`;
          }
          col.appendChild(chip);
        });
      }
      grid.appendChild(col);
    }
    wrap.appendChild(grid);

    const legend=document.createElement('div'); legend.className='legend';
    legend.innerHTML=`
      <div class="item"><span class="dot open"></span>Open slot</div>
      <div class="item"><span class="dot booked"></span>Booked</div>
    `;
    wrap.appendChild(legend);
    return wrap;
  }

  // ---- Step 2: haircut type ----
  function renderType(){
    const wrap=document.createElement('div');
    const slot=schedule.find(s=>s.id===pendingSlotId);

    const top=document.createElement('div'); top.className='topbar';
    const back=document.createElement('button'); back.className='back'; back.innerHTML='‹ Back';
    back.onclick=()=>{ step='pick'; pendingSlotId=null; render(); };
    top.appendChild(back);
    wrap.appendChild(top);

    const wm=document.createElement('div'); wm.className='wordmark'; wm.style.marginTop='6px'; wm.textContent='Guides Cuts';
    wrap.appendChild(wm);

    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Step 2 · What kind of cut?';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(1));

    const ctx=document.createElement('div'); ctx.className='context-card';
    ctx.innerHTML=`Booking for <strong>${fmtFull(slot.date, slot.time)}</strong>`;
    wrap.appendChild(ctx);

    const list=document.createElement('div'); list.className='type-list';
    HAIRCUT_TYPES.forEach(t=>{
      const opt=document.createElement('div');
      opt.className='type-option'+(pendingType===t?' selected':'');
      opt.innerHTML=`<span class="ring"></span><span>${t}</span>`;
      opt.onclick=()=>{ pendingType=t; render(); };
      list.appendChild(opt);
    });
    wrap.appendChild(list);

    const noteField=document.createElement('div'); noteField.className='field';
    noteField.innerHTML=`<label>Notes (optional)</label>`;
    const noteInput=document.createElement('input');
    noteInput.placeholder='e.g. reference photo sent on GroupMe';
    noteInput.value=pendingNote;
    noteInput.oninput=(e)=>{ pendingNote=e.target.value; };
    noteField.appendChild(noteInput);
    wrap.appendChild(noteField);

    const continueBtn=document.createElement('button');
    continueBtn.className='btn btn-primary';
    continueBtn.textContent='Continue';
    continueBtn.disabled=!pendingType;
    continueBtn.onclick=()=>{ if(pendingType){ step='confirm'; render(); } };
    wrap.appendChild(continueBtn);

    return wrap;
  }

  // ---- Step 3: confirm ----
  function renderConfirm(){
    const wrap=document.createElement('div');
    const slot=schedule.find(s=>s.id===pendingSlotId);

    const top=document.createElement('div'); top.className='topbar';
    const back=document.createElement('button'); back.className='back'; back.innerHTML='‹ Back';
    back.onclick=()=>{ step='type'; render(); };
    top.appendChild(back);
    wrap.appendChild(top);

    const wm=document.createElement('div'); wm.className='wordmark'; wm.style.marginTop='6px'; wm.textContent='Guides Cuts';
    wrap.appendChild(wm);

    const sub=document.createElement('div'); sub.className='subtitle';
    sub.textContent='Step 3 · Confirm your booking';
    wrap.appendChild(sub);
    wrap.appendChild(stepDots(2));

    const summary=document.createElement('div'); summary.className='summary';
    const rows=[
      ['Name', clientName.trim()],
      ['When', fmtFull(slot.date, slot.time)],
      ['Haircut', pendingType],
      ['Notes', pendingNote || '—']
    ];
    rows.forEach(([k,v])=>{
      const r=document.createElement('div'); r.className='summary-row';
      r.innerHTML=`<span class="k">${k}</span><span class="v">${escapeHtml(v)}</span>`;
      summary.appendChild(r);
    });
    wrap.appendChild(summary);

    const confirmBtn=document.createElement('button');
    confirmBtn.className='btn btn-primary';
    confirmBtn.textContent='Confirm booking';
    confirmBtn.onclick=confirmBooking;
    wrap.appendChild(confirmBtn);

    return wrap;
  }

  // ---- Step 4: success ----
  function renderSuccess(){
    const wrap=document.createElement('div');
    const wm=document.createElement('div'); wm.className='wordmark'; wm.textContent='Guides Cuts';
    wrap.appendChild(wm);

    const s=document.createElement('div'); s.className='success';
    s.innerHTML=`
      <div class="mark">✓</div>
      <h2>You're booked</h2>
      <p>See you then — the barber can see your booking on their end.</p>
    `;
    wrap.appendChild(s);

    const again=document.createElement('button');
    again.className='btn btn-ghost';
    again.textContent='Book another slot';
    again.onclick=()=>{
      pendingSlotId=null; pendingType=''; pendingNote='';
      step='pick'; render();
    };
    wrap.appendChild(again);

    return wrap;
  }

  function escapeHtml(str){
    const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML;
  }

  loadSchedule();
})();
</script>
</body>
</html>
